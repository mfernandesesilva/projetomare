<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto Maresinha</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --marrom:#5A3E36;
  --salmao:#FF8C7A;
  --bg:#F9F5F3;
}

body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
}

/* MENU */
.menu {
  position:fixed;
  top:0;
  width:100%;
  background:rgba(90,62,54,0.95);
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  z-index:1000;
}

.menu a {
  color:#fff;
  text-decoration:none;
  font-size:13px;
}

/* HERO */
.hero {
  padding:100px 20px 20px;
  text-align:center;
}

.hero h1 {
  color:var(--marrom);
}

/* STREAK */
.streak-box {
  text-align:center;
  background:var(--salmao);
  color:#fff;
  padding:10px;
  border-radius:20px;
  width:fit-content;
  margin:10px auto;
}

/* DASHBOARD */
.dashboard {
  text-align:center;
}

.week {
  display:flex;
  justify-content:center;
  gap:6px;
}

.day {
  width:30px;
  height:30px;
  border-radius:6px;
  background:#ddd;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.day.done {
  background:#4CAF50;
  color:#fff;
}

/* CARDS */
section {
  padding:20px;
  max-width:900px;
  margin:auto;
}

.card {
  background:#fff;
  margin:10px 0;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  border-left:5px solid var(--salmao);
}

.card-header {
  padding:15px;
  background:var(--marrom);
  color:#fff;
  display:flex;
  justify-content:space-between;
}

.card-content {
  max-height:0;
  overflow:hidden;
  padding:0 15px;
  transition:max-height .6s cubic-bezier(.22,1,.36,1);
}

.card.active .card-content {
  max-height:1000px;
  padding:15px;
}

/* BOTÕES */
button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.start-btn { background:var(--marrom); color:#fff; }
.done-btn { background:var(--salmao); color:#fff; }

.timer {
  text-align:center;
  font-weight:bold;
}

/* RESPONSIVO */
@media(max-width:600px){
  .menu { flex-wrap:wrap; }
}
</style>
</head>

<body>

<div class="menu">
  <a href="#treinos">Treinos</a>
</div>

<div class="hero">
  <h1>Projeto Maresinha</h1>
</div>

<div class="streak-box">🔥 Streak: <span id="streak">0</span></div>

<div class="dashboard">
  <h3>📊 Semana</h3>
  <div id="weekProgress"></div>
</div>

<section id="treinos">

<div class="card">
<div class="card-header">Treino A</div>
<div class="card-content">
Glúteo + Core<br>
<button class="start-btn">Iniciar treino</button>
<div class="timer">00:00</div>
<button class="done-btn">Concluir treino</button>
</div>
</div>

<div class="card">
<div class="card-header">Treino B</div>
<div class="card-content">
Costas + Bíceps<br>
<button class="start-btn">Iniciar treino</button>
<div class="timer">00:00</div>
<button class="done-btn">Concluir treino</button>
</div>
</div>

</section>

<script>

// ABRIR CARD
document.querySelectorAll('.card').forEach(c=>{
  c.addEventListener('click',()=>c.classList.toggle('active'))
})

// STREAK
let streak = localStorage.getItem('streak') || 0;
let last = localStorage.getItem('lastDate');
document.getElementById('streak').innerText = streak;

function updateStreak(){
  let today = new Date().toDateString();
  if(last){
    let diff=(new Date(today)-new Date(last))/(1000*60*60*24);
    if(diff===1) streak++;
    else if(diff>1) streak=1;
  } else streak=1;

  localStorage.setItem('streak',streak);
  localStorage.setItem('lastDate',today);
  document.getElementById('streak').innerText=streak;
}

// DASHBOARD
const days=["D","S","T","Q","Q","S","S"];
function renderWeek(){
  let el=document.getElementById('weekProgress');
  el.innerHTML='<div class="week"></div>';
  let w=el.querySelector('.week');

  days.forEach((d,i)=>{
    let div=document.createElement('div');
    div.classList.add('day');
    if(localStorage.getItem('day_'+i)) div.classList.add('done');
    div.innerText=d;
    w.appendChild(div);
  });
}
renderWeek();

function markDay(){
  let i=new Date().getDay();
  localStorage.setItem('day_'+i,'done');
  renderWeek();
}

// TIMER + CONCLUSÃO
document.querySelectorAll('.card').forEach((card,i)=>{

  let startBtn=card.querySelector('.start-btn');
  let doneBtn=card.querySelector('.done-btn');
  let timerEl=card.querySelector('.timer');

  let startTime=localStorage.getItem('start_'+i);
  let running=false;

  function update(){
    if(!running) return;
    let diff=Math.floor((Date.now()-startTime)/1000);
    let m=String(Math.floor(diff/60)).padStart(2,'0');
    let s=String(diff%60).padStart(2,'0');
    timerEl.innerText=`${m}:${s}`;
  }

  if(startTime){
    running=true;
    startBtn.innerText='Parar';
    setInterval(update,1000);
  }

  startBtn.onclick=(e)=>{
    e.stopPropagation();
    if(!running){
      running=true;
      startTime=Date.now();
      localStorage.setItem('start_'+i,startTime);
      startBtn.innerText='Parar';
      setInterval(update,1000);
    } else {
      running=false;
      localStorage.removeItem('start_'+i);
      startBtn.innerText='Iniciar';
    }
  }

  doneBtn.onclick=(e)=>{
    e.stopPropagation();
    localStorage.setItem('treino_'+i,'done');
    doneBtn.innerText='✔ Concluído';
    updateStreak();
    markDay();
  }

});

</script>

</body>
</html>
