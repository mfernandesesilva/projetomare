<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projeto Maresinha</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      -webkit-tap-highlight-color: transparent;
    }

    header {
      background: #2f4f4f;
      color: white;
      padding: 14px;
      text-align: center;
      font-size: 18px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .container {
      padding: 12px;
      max-width: 600px;
      margin: auto;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 10px 14px;
      background: #ddd;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 14px;
      flex-shrink: 0;
    }

    .tab.active {
      background: #2f4f4f;
      color: white;
    }

    .day-panel { display: none; }
    .day-panel.active { display: block; }

    .recipe-card {
      background: white;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      transition: transform 0.15s ease;
    }

    .recipe-card:active {
      transform: scale(0.98);
    }

    .recipe-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-weight: bold;
    }

    .recipe-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 14px;
      line-height: 1.5;
    }

    .recipe-card.open .recipe-content {
      max-height: 600px;
      margin-top: 10px;
    }

    .arrow {
      transition: transform 0.3s ease;
    }

    .recipe-card.open .arrow {
      transform: rotate(180deg);
    }

    /* RESPONSIVO MOBILE */
    @media (max-width: 480px) {
      header { font-size: 16px; }
      .tab { font-size: 13px; padding: 8px 12px; }
      .recipe-card { padding: 12px; }
    }

  </style>
</head>

<body>
  <header>Projeto Maresinha</header>

  <div class="container">

    <div class="tabs">
      <div class="tab active" onclick="changeDay(event,1)">Dia 1</div>
      <div class="tab" onclick="changeDay(event,2)">Dia 2</div>
      <div class="tab" onclick="changeDay(event,3)">Dia 3</div>
    </div>

    <div class="day-panel active" id="day-1">
      <div class="recipe-card">
        <div class="recipe-header" onclick="toggleCard(this)">
          <span>Refeição 1</span>
          <span class="arrow">▼</span>
        </div>
        <div class="recipe-content">
          <p>Detalhes da refeição...</p>
        </div>
      </div>
    </div>

    <div class="day-panel" id="day-2">
      <div class="recipe-card">
        <div class="recipe-header" onclick="toggleCard(this)">
          <span>Refeição 2</span>
          <span class="arrow">▼</span>
        </div>
        <div class="recipe-content">
          <p>Conteúdo dia 2</p>
        </div>
      </div>
    </div>

    <div class="day-panel" id="day-3">
      <div class="recipe-card">
        <div class="recipe-header" onclick="toggleCard(this)">
          <span>Refeição 3</span>
          <span class="arrow">▼</span>
        </div>
        <div class="recipe-content">
          <p>Conteúdo dia 3</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    function changeDay(event, day) {
      document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

      document.getElementById('day-' + day).classList.add('active');
      event.target.classList.add('active');

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleCard(header) {
      const card = header.closest('.recipe-card');

      if (card.classList.contains('pinned')) {
        card.classList.remove('open', 'pinned');
      } else if (card.classList.contains('open')) {
        card.classList.add('pinned');
      } else {
        card.classList.add('open');
      }
    }
  </script>

</body>
</html>
