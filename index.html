<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto Maresinha 🌊</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231C1C1F'/%3E%3Ctext x='32' y='46' font-family='Georgia,serif' font-size='40' font-weight='900' font-style='italic' text-anchor='middle' fill='%23F2A58E'%3EM%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===================== RESET ===================== */
* { margin:0; padding:0; box-sizing:border-box; }

/* ===================== GLOBAL ===================== */
:root {
  /* Shared */
  --ink: #1A1410;
  --ink2: #5C4F43;
  --ink3: #A8967E;
  --border: rgba(26,20,16,0.1);
  --shadow: 0 4px 32px rgba(26,20,16,0.08);

  /* Treino palette */
  --bg: #F7F3EE;
  --surface: #FFFFFF;
  --surface2: #F0EBE3;
  --rose: #E8614A;
  --blush: #F2A58E;
  --sage: #7A9E7E;
  --gold-t: #C9933A;
  --lavender: #9B89B4;
  --sky: #5B8DB8;

  /* Dieta palette */
  --cream: #FDFAF5;
  --warm: #F5EFE3;
  --green: #4A7C59;
  --green-light: #EAF2EC;
  --terracotta: #C4674A;
  --terra-light: #FAF0EC;
  --gold-d: #B8892A;
  --gold-light: #FBF5E6;
  --blue: #3A6B8A;
  --blue-light: #EAF2F8;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events:none; z-index:9999;
}

/* ===================== HERO MARESINHA ===================== */
.hero-maresinha {
  background: var(--ink);
  padding: 56px 24px 70px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero-maresinha::before {
  content:'';
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 15% 50%, rgba(232,97,74,0.28) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 20%, rgba(74,124,89,0.22) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 90%, rgba(91,141,184,0.18) 0%, transparent 40%),
    radial-gradient(ellipse at 70% 60%, rgba(201,147,58,0.15) 0%, transparent 35%);
}

/* Wave decoration */
.hero-maresinha::after {
  content: '🌊';
  position:absolute;
  font-size: 260px;
  right: -40px;
  bottom: -40px;
  opacity: 0.04;
  filter: grayscale(1);
}

.hero-inner-m { position:relative; z-index:1; max-width:680px; margin:0 auto; }

.hero-brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 100px;
  padding: 8px 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  margin-bottom: 28px;
  animation: fadeUp 0.5s ease both;
}

.brand-wave { font-size: 16px; }

.hero-m-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(52px, 13vw, 100px);
  font-weight: 900;
  color: white;
  line-height: 0.95;
  margin-bottom: 12px;
  animation: fadeUp 0.6s ease both;
}

.hero-m-title em {
  font-style: italic;
  background: linear-gradient(135deg, #F2A58E, #E8614A);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-m-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(18px, 4vw, 28px);
  color: rgba(255,255,255,0.38);
  margin-bottom: 36px;
  font-weight: 600;
  animation: fadeUp 0.7s ease both;
}

.hero-m-stats {
  display: flex;
  justify-content: center;
  gap: 28px;
  flex-wrap: wrap;
  margin-bottom: 36px;
  animation: fadeUp 0.8s ease both;
}

.hms { text-align:center; }
.hms-val {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  font-weight: 900;
  color: #F2A58E;
  line-height: 1;
}
.hms-lbl { font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing:1.5px; text-transform:uppercase; margin-top:4px; }
.hms-div { width:1px; height:36px; background:rgba(255,255,255,0.1); align-self:center; }

/* ===================== MAIN NAV ===================== */
.main-nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 20px rgba(0,0,0,0.06);
}

.main-nav-inner {
  max-width: 820px;
  margin: 0 auto;
  display: flex;
}

.main-nav-btn {
  flex: 1;
  padding: 20px 16px;
  border: none;
  background: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--ink2);
  letter-spacing: 0.5px;
  position: relative;
  transition: color 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.main-nav-btn::after {
  content:'';
  position:absolute;
  bottom:0; left:20px; right:20px;
  height:3px;
  border-radius:3px 3px 0 0;
  transform: scaleX(0);
  transition: transform 0.25s ease;
}

.main-nav-btn.treino-active { color: var(--rose); }
.main-nav-btn.treino-active::after { background: var(--rose); transform: scaleX(1); }
.main-nav-btn.dieta-active { color: var(--green); }
.main-nav-btn.dieta-active::after { background: var(--green); transform: scaleX(1); }

.nav-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}

.nb-treino { background: #FFF0EE; color: var(--rose); }
.nb-dieta { background: var(--green-light); color: var(--green); }

.main-nav-btn.snacks-active { color: #C8622A; }
.main-nav-btn.snacks-active::after { background: #C8622A; transform: scaleX(1); }
.nb-snacks { background: rgba(200,98,42,0.12); color: #C8622A; }

/* ── COMPACT TREINO OVERVIEW ── */
.treino-overview { max-width:960px; margin:0 auto; padding:28px 18px 70px; }
.treino-week-bar { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:22px; }
.tw-card { background:var(--surface); border:1.5px solid var(--border); border-radius:16px; overflow:hidden; cursor:pointer; transition:transform 0.22s,box-shadow 0.22s; }
.tw-card:hover { transform:translateY(-4px); box-shadow:var(--shadow); }
.tw-head { padding:18px 14px 14px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:3px; }
.tw-letter { font-family:'Playfair Display',serif; font-size:38px; font-weight:900; line-height:1; }
.tw-name { font-size:11px; font-weight:700; color:var(--ink2); text-transform:uppercase; letter-spacing:1px; }
.tw-day { font-size:10px; color:var(--ink3); margin-bottom:2px; }
.tw-kcal-pill { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; margin-top:2px; }
.tw-hint { font-size:10px; color:var(--ink3); margin-top:4px; transition:opacity 0.2s; }
.tw-card:hover .tw-hint,.tw-card.topen .tw-hint { opacity:0; height:0; margin:0; overflow:hidden; }
.tw-drawer { max-height:0; overflow:hidden; transition:max-height 0.45s cubic-bezier(0.4,0,0.2,1); border-top:0px solid var(--border); }
.tw-card:hover .tw-drawer,.tw-card.topen .tw-drawer { max-height:900px; border-top-width:1px; }
.tw-din { padding:13px 13px 15px; }
.tw-focus { font-size:11px; color:var(--ink2); font-style:italic; margin-bottom:8px; }
.tw-meta { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; margin-bottom:10px; }
.tw-mi { background:var(--cream); border-radius:7px; padding:5px 3px; text-align:center; }
.tw-mv { font-size:11px; font-weight:700; }
.tw-ml { font-size:9px; color:var(--ink3); text-transform:uppercase; letter-spacing:0.6px; }
.tw-band { display:flex; align-items:center; gap:6px; background:#FFF8F0; border:1px solid #F5D5A8; border-radius:7px; padding:6px 9px; font-size:10px; color:#8A5A20; margin-bottom:9px; }
.tw-exlist { display:flex; flex-direction:column; gap:4px; margin-bottom:10px; }
.tw-ex { display:flex; align-items:center; gap:7px; padding:6px 8px; border-radius:8px; background:var(--cream); text-decoration:none; color:var(--ink); transition:background 0.15s; font-size:12px; }
.tw-ex:hover { background:rgba(0,0,0,0.05); }
.tw-exn { width:18px; height:18px; border-radius:5px; font-size:9px; font-weight:800; color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.tw-exinfo { flex:1; min-width:0; }
.tw-exname { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:11px; }
.tw-exsets { font-size:10px; color:var(--ink2); margin-top:1px; }
.tw-exkcal { font-size:10px; font-weight:700; flex-shrink:0; }
.tw-btag { font-size:9px; background:#FFF3E8; color:#C27820; border-radius:4px; padding:1px 4px; display:inline-block; margin-top:1px; }
.tw-total { display:flex; justify-content:space-between; align-items:center; border-radius:8px; padding:9px 12px; color:white; }
.tw-tlbl { font-size:9px; opacity:0.65; text-transform:uppercase; letter-spacing:1px; }
.tw-tval { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; line-height:1; }
.tw-tsub { font-size:9px; opacity:0.45; margin-top:1px; }
.tw-tico { font-size:22px; opacity:0.22; }
.tw-tips { margin-top:9px; }
.tw-tip { font-size:11px; color:var(--ink2); display:flex; gap:5px; margin-bottom:3px; }
.tw-tipdot { width:4px; height:4px; border-radius:50%; flex-shrink:0; margin-top:5px; }
@media(max-width:700px){ .treino-week-bar{grid-template-columns:1fr 1fr;} .tw-meta{grid-template-columns:repeat(2,1fr);} }
@media(max-width:420px){ .treino-week-bar{grid-template-columns:1fr;} }


/* ── RECIPE DRAWER in diet ── */
.meal-recipe-btn {
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:9px;background:var(--cream);
  border:none;border-top:1px solid var(--border);
  font-family:inherit;font-size:11px;font-weight:700;
  color:var(--ink2);cursor:pointer;transition:all 0.2s;
  letter-spacing:0.5px;
}
.meal-recipe-btn:hover{background:rgba(0,0,0,0.04);color:var(--ink);}
.meal-recipe-arrow{transition:transform 0.3s;}
.meal-recipe-arrow.ropen{transform:rotate(180deg);}
.meal-recipe-drawer{display:none;background:var(--cream);border-top:1px solid var(--border);padding:16px 18px;}
.meal-recipe-drawer.ropen{display:block;}
.mrd-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:9px;}
.mrd-ingr{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.mrd-row{display:flex;justify-content:space-between;font-size:12px;color:var(--ink2);padding:4px 0;border-bottom:1px dashed rgba(28,23,18,0.06);}
.mrd-row:last-child{border-bottom:none;}
.mrd-qty{font-weight:700;color:var(--ink);white-space:nowrap;margin-left:8px;}
.mrd-steps{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
.mrd-step{display:flex;gap:8px;font-size:12px;color:var(--ink2);line-height:1.6;}
.mrd-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;margin-top:2px;}
.mrd-step strong{color:var(--ink);}
.mrd-tip{background:rgba(94,158,106,0.08);border:1px solid rgba(94,158,106,0.2);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--green);line-height:1.6;display:flex;gap:7px;}


/* ── SNACKS SECTION ── */
.snacks-wrap { background: #0D0D0F; min-height:60vh; }
.snacks-content { max-width:860px; margin:0 auto; padding:36px 20px 80px; }

/* filter sub-nav */
.snk-fnav { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:32px; }
.snk-ftab {
  border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04);
  border-radius:100px; padding:7px 16px;
  font-family:inherit; font-size:12px; font-weight:600;
  color:rgba(255,255,255,0.5); cursor:pointer; transition:all 0.2s;
}
.snk-ftab:hover { border-color:rgba(255,255,255,0.25); color:rgba(255,255,255,0.85); }
.snk-ftab.son { background:#C8622A; border-color:#C8622A; color:#fff; }
.snk-ftab.sfru.son { background:#5E9E6A; border-color:#5E9E6A; }
.snk-ftab.screm.son { background:#C4A55A; border-color:#C4A55A; color:#0D0D0F; }
.snk-ftab.sanx.son { background:#4E8FA8; border-color:#4E8FA8; }
.snk-ftab.srot.son { background:#8B7BAA; border-color:#8B7BAA; }

.snk-cat { display:none; }
.snk-cat.sshow { display:block; }

/* section header */
.snk-hd { margin-bottom:20px; padding-bottom:14px; border-bottom:1px solid rgba(255,255,255,0.07); }
.snk-stag { display:inline-block; font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 12px; border-radius:100px; margin-bottom:8px; }
.snk-stitle { font-family:'Playfair Display',serif; font-size:clamp(20px,3.5vw,28px); font-weight:700; color:#F5F0E8; line-height:1.1; margin-bottom:5px; }
.snk-ssub { font-size:13px; color:rgba(255,255,255,0.4); }

/* recipe grid */
.snk-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(255px,1fr)); gap:14px; margin-bottom:44px; }

/* recipe card */
.snk-rcard {
  background:#1C1C1F; border:1px solid rgba(255,255,255,0.07);
  border-radius:16px; overflow:hidden;
  display:flex; flex-direction:column;
  transition:transform 0.22s, box-shadow 0.22s;
}
.snk-rcard:hover { transform:translateY(-4px); box-shadow:0 12px 40px rgba(0,0,0,0.6); }
.snk-rcard-top { padding:18px 18px 0; display:flex; justify-content:space-between; align-items:flex-start; }
.snk-rcard-emoji { font-size:32px; line-height:1; }
.snk-rcard-kcal { text-align:right; }
.snk-rkv { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; line-height:1; }
.snk-rkl { font-size:9px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:1px; }
.snk-rcard-body { padding:12px 18px 18px; flex:1; display:flex; flex-direction:column; }
.snk-rcard-name { font-family:'Playfair Display',serif; font-size:16px; font-weight:700; color:#F5F0E8; line-height:1.25; margin-bottom:5px; }
.snk-rcard-desc { font-size:12px; color:rgba(255,255,255,0.45); line-height:1.6; margin-bottom:10px; flex:1; }
.snk-rcard-tags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:12px; }
.snk-rtag { font-size:10px; font-weight:600; padding:2px 8px; border-radius:100px; }
.snk-rcard-macros { display:flex; gap:6px; border-top:1px solid rgba(255,255,255,0.06); padding-top:12px; }
.snk-rmacro { text-align:center; flex:1; }
.snk-rmv { font-size:12px; font-weight:700; }
.snk-rml { font-size:9px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:0.8px; margin-top:1px; }
.snk-expand-btn {
  display:flex; align-items:center; justify-content:center; gap:6px;
  width:100%; padding:11px; background:rgba(255,255,255,0.03);
  border:none; border-top:1px solid rgba(255,255,255,0.06);
  font-family:inherit; font-size:12px; font-weight:600;
  color:rgba(255,255,255,0.4); cursor:pointer; transition:all 0.2s;
}
.snk-expand-btn:hover { color:rgba(255,255,255,0.8); background:rgba(255,255,255,0.06); }
.snk-exp-arrow { transition:transform 0.3s; }
.snk-exp-arrow.sopen { transform:rotate(180deg); }
.snk-rdetail { display:none; background:rgba(255,255,255,0.03); border-top:1px solid rgba(255,255,255,0.06); padding:18px; }
.snk-rdetail.sopen { display:block; }
.snk-det-title { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:10px; }
.snk-ingr-list { display:flex; flex-direction:column; gap:5px; margin-bottom:16px; }
.snk-ingr-item { display:flex; justify-content:space-between; font-size:12px; color:rgba(255,255,255,0.5); padding:4px 0; border-bottom:1px dashed rgba(255,255,255,0.05); }
.snk-ingr-item:last-child { border-bottom:none; }
.snk-ingr-qty { font-weight:600; color:rgba(255,255,255,0.8); white-space:nowrap; margin-left:8px; }
.snk-steps { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
.snk-step { display:flex; gap:9px; font-size:12px; color:rgba(255,255,255,0.5); line-height:1.6; }
.snk-snum { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; flex-shrink:0; margin-top:2px; }
.snk-step strong { color:rgba(255,255,255,0.85); }
.snk-tip { background:rgba(255,255,255,0.04); border-radius:9px; padding:9px 12px; font-size:12px; color:rgba(255,255,255,0.5); line-height:1.6; display:flex; gap:7px; }

/* snack strip */
.snk-strip { display:flex; flex-direction:column; gap:9px; margin-bottom:44px; }
.snk-item {
  background:#1C1C1F; border:1px solid rgba(255,255,255,0.07); border-radius:13px;
  display:flex; align-items:center; gap:13px; padding:13px 16px;
  transition:transform 0.2s, box-shadow 0.2s;
}
.snk-item:hover { transform:translateX(4px); box-shadow:0 4px 20px rgba(0,0,0,0.5); }
.snk-ico { font-size:26px; flex-shrink:0; }
.snk-iname { font-size:13px; font-weight:600; color:#F5F0E8; margin-bottom:2px; }
.snk-idesc { font-size:12px; color:rgba(255,255,255,0.4); line-height:1.5; }
.snk-iright { text-align:right; flex-shrink:0; }
.snk-ikv { font-family:'Playfair Display',serif; font-size:17px; font-weight:700; }
.snk-ikl { font-size:9px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:1px; }
.snk-itags { display:flex; gap:4px; margin-top:4px; justify-content:flex-end; flex-wrap:wrap; }
.snk-stag2 { font-size:10px; font-weight:600; padding:2px 8px; border-radius:100px; }

/* anxiety box */
.snk-anx { background:linear-gradient(135deg,rgba(94,158,106,0.07),rgba(78,143,168,0.07)); border:1.5px solid rgba(94,158,106,0.18); border-radius:16px; padding:22px; margin-bottom:36px; }
.snk-anx-title { font-family:'Playfair Display',serif; font-size:19px; font-weight:700; color:#F5F0E8; margin-bottom:14px; }
.snk-anx-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.snk-anx-item { background:rgba(255,255,255,0.04); border-radius:11px; padding:12px 13px; display:flex; gap:9px; align-items:flex-start; }
.snk-anx-icon { font-size:18px; flex-shrink:0; margin-top:1px; }
.snk-anx-text { font-size:12px; color:rgba(255,255,255,0.5); line-height:1.65; }
.snk-anx-text strong { color:rgba(255,255,255,0.85); }

/* rotina */
.snk-rot { background:#1C1C1F; border:1px solid rgba(255,255,255,0.07); border-radius:16px; overflow:hidden; margin-bottom:32px; }
.snk-rot-head { padding:18px 22px; border-bottom:1px solid rgba(255,255,255,0.07); }
.snk-rot-title { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:#F5F0E8; }
.snk-rot-sub { font-size:12px; color:rgba(255,255,255,0.35); margin-top:2px; }

/* ===================== SECTIONS ===================== */
.section-wrap { display:none; }
.section-wrap.active { display:block; animation: fadeUp 0.35s ease; }

/* ===================== TREINO STYLES ===================== */
.treino-wrap {
  background: var(--bg);
}

/* Sub tabs (ABCDE) */
.tabs-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 65px;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}

.tabs {
  display: flex;
  max-width: 820px;
  margin: 0 auto;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display:none; }

.tab-btn {
  flex: 1;
  min-width: 80px;
  padding: 16px 10px;
  border: none;
  background: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink2);
  position: relative;
  transition: color 0.2s;
  white-space: nowrap;
}

.tab-btn::after {
  content:'';
  position:absolute;
  bottom:0; left:10px; right:10px;
  height:3px;
  border-radius:3px 3px 0 0;
  background: var(--rose);
  transform: scaleX(0);
  transition: transform 0.25s ease;
}

.tab-btn.active { color: var(--ink); }
.tab-btn.active::after { transform: scaleX(1); }

.tab-letter {
  display: block;
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 2px;
}

.treino-content { max-width: 820px; margin: 0 auto; padding: 36px 20px 70px; }

/* workout header */
.workout-header {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 20px;
  align-items: start;
  margin-bottom: 28px;
}
.workout-label { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
.workout-name { font-family:'Playfair Display',serif; font-size:clamp(26px,5vw,40px); font-weight:900; line-height:1.1; margin-bottom:10px; }
.workout-focus { display:inline-flex; align-items:center; gap:6px; background:var(--surface2); border-radius:8px; padding:6px 14px; font-size:13px; font-weight:500; color:var(--ink2); }
.kcal-badge { background:var(--ink); color:white; border-radius:16px; padding:18px 22px; text-align:center; min-width:110px; }
.kcal-range { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; line-height:1; }
.kcal-unit { font-size:11px; color:rgba(255,255,255,0.4); letter-spacing:1px; text-transform:uppercase; margin-top:4px; }

/* meta row */
.meta-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:28px; }
.meta-item { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 12px; text-align:center; }
.meta-val { font-size:16px; font-weight:700; }
.meta-lbl { font-size:10px; color:var(--ink2); text-transform:uppercase; letter-spacing:1px; margin-top:3px; }

/* exercise */
.ex-section-title { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--ink2); margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border); }
.ex-list { display:flex; flex-direction:column; gap:10px; margin-bottom:28px; }

.ex-card {
  background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 18px;
  display:grid; grid-template-columns:36px 1fr auto auto; align-items:center; gap:12px;
  transition:all 0.2s; cursor:pointer; text-decoration:none; color:inherit;
}
.ex-card:hover { transform:translateX(4px); box-shadow:var(--shadow); }
.ex-n { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:700; font-size:16px; color:white; flex-shrink:0; }
.ex-name-txt { font-size:14px; font-weight:600; margin-bottom:3px; }
.ex-sets { font-size:12px; color:var(--ink2); }
.ex-kcal-col { text-align:right; }
.ex-kcal-val { font-family:'Playfair Display',serif; font-size:17px; font-weight:700; }
.ex-kcal-lbl { font-size:10px; color:var(--ink2); text-transform:uppercase; letter-spacing:1px; }
.ex-yt { width:30px; height:30px; background:#FF0000; border-radius:8px; display:flex; align-items:center; justify-content:center; color:white; font-size:10px; flex-shrink:0; text-decoration:none; transition:transform 0.2s; }
.ex-yt:hover { transform:scale(1.1); }

/* band tag */
.band-tag { display:inline-flex; align-items:center; gap:4px; background:#FFF3E0; border:1px solid #FFCC80; color:#E65100; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; margin-top:4px; white-space:nowrap; }
.band-info { background:linear-gradient(135deg,#FFF8F0,#FFF3E0); border:1.5px solid #FFCC80; border-radius:14px; padding:16px 18px; margin-bottom:20px; display:flex; align-items:center; gap:12px; }
.band-icon { font-size:26px; flex-shrink:0; }
.band-info-title { font-size:13px; font-weight:700; color:#E65100; margin-bottom:2px; }
.band-info-desc { font-size:12px; color:#8D5524; line-height:1.5; }

/* total bar */
.total-bar { border-radius:16px; padding:22px 26px; display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; color:white; }
.total-bar-label { font-size:12px; opacity:0.8; margin-bottom:4px; }
.total-bar-val { font-family:'Playfair Display',serif; font-size:34px; font-weight:900; line-height:1; }
.total-bar-sub { font-size:12px; opacity:0.6; margin-top:4px; }
.total-bar-icon { font-size:44px; opacity:0.25; }

/* tips box */
.tips-box { background:var(--surface2); border-radius:14px; padding:20px 22px; margin-bottom:20px; }
.tips-box-title { font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--ink2); margin-bottom:12px; }
.tip-line { display:flex; gap:10px; align-items:flex-start; font-size:13px; line-height:1.6; color:var(--ink2); margin-bottom:8px; }
.tip-dot { width:6px; height:6px; border-radius:50%; margin-top:6px; flex-shrink:0; }

/* week grid */
.week-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin:32px 0 0; padding-top:32px; border-top:1px solid var(--border); }
.week-card { border-radius:12px; padding:14px 10px; text-align:center; border:2px solid transparent; cursor:pointer; transition:all 0.2s; }
.week-card:hover { transform:translateY(-3px); box-shadow:var(--shadow); }
.wk-letter { font-family:'Playfair Display',serif; font-size:28px; font-weight:900; line-height:1; margin-bottom:4px; }
.wk-name { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.wk-kcal { font-size:11px; opacity:0.65; }

/* workout panel */
.workout-panel { display:none; animation: fadeUp 0.35s ease; }
.workout-panel.active { display:block; }

/* ===================== DIETA STYLES ===================== */
.dieta-wrap { background: var(--cream); }
.dieta-content { max-width: 720px; margin: 0 auto; padding: 36px 20px 70px; }

/* macro section */
.macro-section { background:var(--ink); border-radius:20px; padding:26px; margin-bottom:28px; color:white; }
.macro-title { font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:16px; }
.macro-kcal { font-family:'Cormorant Garamond',serif; font-size:50px; font-weight:700; line-height:1; color:#A8D5B0; margin-bottom:4px; }
.macro-kcal span { font-size:20px; color:rgba(255,255,255,0.35); }
.macro-sub { font-size:13px; color:rgba(255,255,255,0.38); margin-bottom:24px; }
.macro-bars { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.macro-label { font-size:11px; color:rgba(255,255,255,0.38); text-transform:uppercase; letter-spacing:1px; margin-bottom:7px; }
.macro-bar-wrap { background:rgba(255,255,255,0.07); border-radius:100px; height:6px; margin-bottom:5px; overflow:hidden; }
.macro-bar-fill { height:100%; border-radius:100px; width:0; transition:width 1.5s cubic-bezier(0.4,0,0.2,1); }
.macro-val { font-size:13px; font-weight:600; }

/* day tabs */
.day-tabs { display:flex; gap:8px; margin-bottom:24px; overflow-x:auto; scrollbar-width:none; padding-bottom:4px; }
.day-tabs::-webkit-scrollbar { display:none; }
.day-tab { flex-shrink:0; border:1.5px solid var(--border); background:white; border-radius:12px; padding:9px 16px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; color:var(--ink2); cursor:pointer; transition:all 0.2s; }
.day-tab.active { background:var(--ink); border-color:var(--ink); color:white; }
.day-tab:hover:not(.active) { border-color:var(--ink); }

/* meal card */
.section-heading { display:flex; align-items:center; gap:10px; margin-bottom:12px; margin-top:24px; }
.meal-icon { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
.meal-label { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; }
.meal-time { font-size:12px; color:var(--ink3); margin-left:auto; }

.meal-card { background:white; border:1px solid var(--border); border-radius:14px; padding:18px 20px; margin-bottom:8px; transition:box-shadow 0.2s; }
.meal-card:hover { box-shadow:var(--shadow); }
.meal-name { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:600; margin-bottom:10px; line-height:1.2; }
.meal-items { margin-bottom:12px; }
.meal-item { display:flex; align-items:flex-start; gap:8px; font-size:13px; color:var(--ink2); padding:3px 0; border-bottom:1px dashed rgba(28,23,18,0.06); line-height:1.4; }
.meal-item:last-child { border-bottom:none; }
.item-bullet { width:5px; height:5px; border-radius:50%; margin-top:5px; flex-shrink:0; }
.meal-foot { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.macro-chip { font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; }
.chip-kcal { background:var(--warm); color:var(--ink); }
.chip-p { background:var(--blue-light); color:var(--blue); }
.chip-c { background:var(--gold-light); color:var(--gold-d); }
.chip-g { background:var(--green-light); color:var(--green); }
.tip-inline { margin-left:auto; font-size:11px; color:var(--ink3); font-style:italic; }

/* day total */
.day-total { background:var(--green); color:white; border-radius:14px; padding:20px 22px; display:flex; justify-content:space-between; align-items:center; margin-top:20px; }
.dt-label { font-size:11px; opacity:0.7; margin-bottom:3px; letter-spacing:1px; text-transform:uppercase; }
.dt-val { font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:700; line-height:1; }
.dt-sub { font-size:11px; opacity:0.6; margin-top:2px; }
.dt-icon { font-size:36px; opacity:0.22; }

/* day panel */
.day-panel { display:none; }
.day-panel.active { display:block; animation: fadeUp 0.3s ease; }

/* weekly summary */
.week-summary { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:32px; padding-top:32px; border-top:1px solid var(--border); }
.ws-card { background:white; border:1.5px solid var(--border); border-radius:10px; padding:12px 6px; text-align:center; cursor:pointer; transition:all 0.2s; }
.ws-card:hover { transform:translateY(-3px); box-shadow:var(--shadow); border-color:var(--green); }
.ws-day { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--ink3); margin-bottom:3px; }
.ws-kcal { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:700; color:var(--green); }
.ws-sub { font-size:9px; color:var(--ink3); }

/* rules */
.rules { margin-top:28px; background:var(--warm); border-radius:16px; padding:24px; }
.rules-title { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:700; margin-bottom:16px; }
.rule-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.rule-item { background:white; border-radius:12px; padding:12px 14px; font-size:13px; color:var(--ink2); line-height:1.5; display:flex; gap:10px; align-items:flex-start; }
.rule-emoji { font-size:16px; flex-shrink:0; }
.avoid-section { margin-top:16px; background:#FEF5F3; border:1px solid #F5C5BB; border-radius:12px; padding:18px 20px; }
.avoid-title { font-size:12px; font-weight:700; color:var(--terracotta); letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
.avoid-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
.avoid-item { background:white; border-radius:8px; padding:8px 10px; font-size:12px; color:var(--terracotta); font-weight:500; text-align:center; border:1px solid #F5C5BB; }

/* goal card */
.goal-card { margin-top:18px; background:var(--ink); border-radius:16px; padding:24px; color:white; display:grid; grid-template-columns:1fr auto; gap:16px; align-items:center; }
.gc-label { font-size:11px; opacity:0.4; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
.gc-val { font-family:'Cormorant Garamond',serif; font-size:46px; font-weight:700; color:#A8D5B0; line-height:1; }
.gc-sub { font-size:12px; opacity:0.45; margin-top:5px; }
.gc-badge { background:rgba(168,213,176,0.12); border:1px solid rgba(168,213,176,0.22); border-radius:12px; padding:14px 18px; text-align:center; }
.gc-badge-num { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:700; color:#A8D5B0; line-height:1; }
.gc-badge-lbl { font-size:10px; opacity:0.4; text-transform:uppercase; letter-spacing:1px; margin-top:3px; }

<script>
// Main section toggle
function showSection(sec) {
  document.querySelectorAll('.section-wrap').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + sec).classList.add('active');

  const btnT = document.getElementById('btn-treino');
  const btnD = document.getElementById('btn-dieta');
  const btnS = document.getElementById('btn-snacks');
  btnT.className = 'main-nav-btn' + (sec==='treino' ? ' treino-active' : '');
  btnD.className = 'main-nav-btn' + (sec==='dieta' ? ' dieta-active' : '');
  btnS.className = 'main-nav-btn' + (sec==='snacks' ? ' snacks-active' : '');

  if(sec==='dieta') {
    setTimeout(() => {
      document.querySelectorAll('.macro-bar-fill').forEach(el => { el.style.width = el.dataset.w + '%'; });
    }, 200);
  }
  window.scrollTo({top:0, behavior:'smooth'});
}

  const drawer = btn.nextElementSibling;

  drawer.classList.toggle('ropen', !isOpen);
  arrow.classList.toggle('ropen', !isOpen);
  btn.childNodes[0].textContent = isOpen ? '\u{1F4CB} Ver receita passo a passo ' : '\u{1F4CB} Fechar receita ';
}

function showSnkCat(cat, btn) {
  document.querySelectorAll('.snk-ftab').forEach(b => b.classList.remove('son'));
  btn.classList.add('son');
  const cats = document.querySelectorAll('.snk-cat');
  if (cat === 'all') {
    cats.forEach(c => c.classList.add('sshow'));
  } else {
    cats.forEach(c => c.classList.remove('sshow'));
    const t = document.getElementById('snk-' + cat);
    if (t) t.classList.add('sshow');
  }
  window.scrollTo({top: document.querySelector('.snacks-content').offsetTop - 10, behavior: 'smooth'});
}

function toggleSnkRecipe(btn) {
  const detail = btn.nextElementSibling;
  const arrow = btn.querySelector('.snk-exp-arrow');
  const isOpen = detail.classList.contains('sopen');
  detail.classList.toggle('sopen', !isOpen);
  arrow.classList.toggle('sopen', !isOpen);
  btn.childNodes[0].textContent = isOpen ? 'Ver receita completa ' : 'Fechar receita ';
}

// Treino tabs (ABCDE)
function showTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.workout-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  const wrap = document.querySelector('.tabs-wrap');
  window.scrollTo({top: wrap.offsetTop - 10, behavior:'smooth'});
}

// Dieta day tabs
function showDay(idx) {
  document.querySelectorAll('.day-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.day-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  const dt = document.querySelector('.day-tabs');
  window.scrollTo({top: dt.offsetTop - 80, behavior:'smooth'});
}

// Animate macro bars on load
window.addEventListener('load', () => {
  setTimeout(() => {
    document.querySelectorAll('.macro-bar-fill').forEach(el => { el.style.width = el.dataset.w + '%'; });
  }, 500);
});
</script>
